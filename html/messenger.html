<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jobi Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Сообщения в стиле нео-брутализм */
        .msg { 
            max-width: 80%; padding: 12px 16px; border: 3px solid black; 
            font-weight: 700; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            position: relative; word-wrap: break-word;
        }
        .msg-out { background: #FFD700; align-self: flex-start; border-radius: 20px 20px 0 20px; }
        .msg-in { background: white; align-self: flex-end; border-radius: 20px 20px 20px 0; }
        
        /* Инфо под сообщением */
        .msg-info { font-size: 10px; display: flex; gap: 5px; margin-top: 5px; font-weight: 900; opacity: 0.6; }
        .seen-tick { color: #0066ff; }

        /* Контекстное меню */
        #menu {
            position: fixed; background: white; border: 4px solid black; 
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); display: none; z-index: 100;
        }
        .menu-btn { padding: 10px 20px; font-weight: 900; cursor: pointer; border-bottom: 2px solid black; }
        .menu-btn:last-child { border-bottom: none; }
        .menu-btn:hover { background: #FFD700; }

        footer { background: white; border-top: 4px solid black; padding: 15px; }
        textarea { resize: none; max-height: 150px; }
    </style>
</head>
<body>

    <div id="chat-flow"></div>

    <div id="menu">
        <div class="menu-btn" onclick="replyMsg()">הגב (Ответить)</div>
        <div class="menu-btn" id="edit-btn" onclick="startEdit()">ערוך (Изменить)</div>
        <div class="menu-btn text-red-600" id="del-btn" onclick="deleteMsg()">מחק (Удалить)</div>
    </div>

    <footer>
        <div id="edit-indicator" class="hidden text-xs font-black mb-2 text-blue-600">עורך הודעה... (Редактирование) <span class="cursor-pointer text-red-500" onclick="cancelEdit()">[ביטול]</span></div>
        <div class="flex items-end gap-3">
            <label class="cursor-pointer">
                <img src="img/files.png" class="w-8 h-8 hover:scale-110 transition">
                <input type="file" id="file-input" class="hidden">
            </label>
            <textarea id="msg-input" placeholder="כתוב הודעה..." rows="1" class="flex-1 p-3 border-4 border-black rounded-2xl outline-none font-bold"></textarea>
            <button onclick="handleSend()">
                <img src="img/send.png" class="w-10 h-10 hover:scale-110 active:scale-95 transition">
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const chatId = params.get('chatId');
        const myId = localStorage.getItem('user_id');

        let editingId = null;
        let contextId = null;

        const input = document.getElementById('msg-input');
        const flow = document.getElementById('chat-flow');
        const menu = document.getElementById('menu');

        // 1. Обработка Enter / Shift+Enter
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // 2. Отправка и Изменение
        window.handleSend = async () => {
            const val = input.value.trim();
            if (!val) return;

            if (editingId) {
                await updateDoc(doc(db, `chats/${chatId}/messages`, editingId), { content: val, edited: true });
                cancelEdit();
            } else {
                await addDoc(collection(db, `chats/${chatId}/messages`), {
                    senderId: myId,
                    content: val,
                    timestamp: serverTimestamp(),
                    seen: false
                });
                await updateDoc(doc(db, "chats", chatId), { lastMessage: val, lastUpdate: Date.now() });
            }
            input.value = '';
            input.style.height = 'auto';
        };

        // 3. Загрузка сообщений
        onSnapshot(query(collection(db, `chats/${chatId}/messages`), orderBy("timestamp", "asc")), (snap) => {
            flow.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.senderId === myId;
                const time = m.timestamp?.toDate().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}) || '';
                
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'msg-out' : 'msg-in'}`;
                div.innerHTML = `
                    <div>${m.content}</div>
                    <div class="msg-info">
                        <span>${time}</span>
                        ${isMe ? `<span class="${m.seen ? 'seen-tick' : ''}">${m.seen ? '✓✓' : '✓'}</span>` : ''}
                    </div>
                `;

                // Контекстное меню (ПКМ или Долгое нажатие)
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    contextId = d.id;
                    showMenu(e.pageX, e.pageY, isMe, m.content);
                };

                flow.appendChild(div);
            });
            flow.scrollTop = flow.scrollHeight;
        });

        function showMenu(x, y, isMe, content) {
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            document.getElementById('edit-btn').style.display = isMe ? 'block' : 'none';
            document.getElementById('del-btn').style.display = isMe ? 'block' : 'none';
            menu.dataset.content = content;
        }

        window.onclick = () => menu.style.display = 'none';

        // Функции меню
        window.startEdit = () => {
            editingId = contextId;
            input.value = menu.dataset.content;
            document.getElementById('edit-indicator').classList.remove('hidden');
            input.focus();
        };

        window.cancelEdit = () => {
            editingId = null;
            input.value = '';
            document.getElementById('edit-indicator').classList.add('hidden');
        };

        window.deleteMsg = async () => {
            if (confirm("מחק הודעה?")) {
                await deleteDoc(doc(db, `chats/${chatId}/messages`, contextId));
            }
        };
    </script>
</body>
</html>
