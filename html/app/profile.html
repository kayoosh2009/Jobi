<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרופיל Jobi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fefff1; font-family: 'Heebo', sans-serif; color: #333; }
        .navbar-jobi { background-color: #feb900; }
        
        /* Карточки в стиле Jobi (как на главной) */
        .jobi-card { background: white; border: 2px solid #feb900; border-radius: 25px; box-shadow: 0 4px 15px rgba(254, 185, 0, 0.1); }
        .stat-badge { background: #fefff1; border: 1px solid #feb900; border-radius: 15px; transition: 0.3s; }
        
        /* XP Bar */
        .xp-bar-bg { background: #eee; height: 12px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .xp-bar-fill { background: linear-gradient(90deg, #feb900, #ff8c00); height: 100%; transition: width 1s ease; }

        /* Меню (1 в 1 как на главной) */
        .side-menu { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: white; z-index: 100; transition: 0.4s; border-right: 3px solid #feb900; }
        .side-menu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 90; backdrop-filter: blur(2px); }
        
        .burger-btn { display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .burger-btn span { width: 24px; height: 3px; background: black; border-radius: 2px; }
    </style>
</head>
<body class="pb-10">

    <div id="overlay" class="overlay" onclick="toggleMenu(false)"></div>

    <div id="side-menu" class="side-menu p-6 text-right flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button onclick="toggleMenu(false)" class="text-2xl font-bold">✕</button>
            <img src="../img/logo.png" class="h-8">
        </div>
        <nav id="nav-content" class="flex flex-col gap-5 font-bold text-lg">
            </nav>
    </div>

    <header class="navbar-jobi p-3 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <img src="../img/logo.png" alt="Jobi" class="h-10">
                <div class="flex flex-col leading-tight">
                    <span class="text-2xl font-black italic">Jobi</span>
                    <span class="text-[9px] font-bold opacity-70">פרופיל אישי</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="../index.html" class="bg-white/40 px-3 py-1 rounded-full text-sm font-bold border border-white/50 hover:bg-white/60 transition">חזרה לבית</a>
                <div class="burger-btn" onclick="toggleMenu(true)">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-8">
        <div class="jobi-card p-6 md:p-10 mb-8">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="relative">
                    <img id="user-avatar" src="../img/profile.png" class="w-32 h-32 rounded-full border-4 border-[#feb900] object-cover shadow-md">
                    <div id="level-tag" class="absolute -bottom-2 -right-2 bg-black text-[#feb900] px-3 py-1 rounded-full font-black text-sm border-2 border-[#feb900]">LVL 1</div>
                </div>
                
                <div class="flex-grow text-center md:text-right">
                    <h1 id="user-name" class="text-4xl font-black mb-1">טוען...</h1>
                    <p id="user-age" class="text-gray-500 font-bold mb-4">גיל: --</p>
                    
                    <div class="max-w-md mx-auto md:mr-0">
                        <div class="flex justify-between text-[11px] font-black mb-1 uppercase tracking-tighter">
                            <span>התקדמות לרמה הבאה</span>
                            <span><span id="xp-current">0</span>/100 XP</span>
                        </div>
                        <div class="xp-bar-bg">
                            <div id="xp-fill" class="xp-bar-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button onclick="location.href='settings.html'" class="bg-black text-[#feb900] px-6 py-3 rounded-2xl font-black hover:scale-105 transition">עריכת פרופיל</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-right">
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div class="stat-badge p-4 text-center">
                        <span class="block text-2xl font-black">0</span>
                        <span class="text-[10px] font-bold text-gray-500 uppercase">הגשות</span>
                    </div>
                    <div class="stat-badge p-4 text-center">
                        <span class="block text-2xl font-black">0</span>
                        <span class="text-[10px] font-bold text-gray-500 uppercase">צפיות</span>
                    </div>
                    <div class="stat-badge p-4 text-center">
                        <span class="block text-2xl font-black">0</span>
                        <span class="text-[10px] font-bold text-gray-500 uppercase">מועדפים</span>
                    </div>
                </div>

                <div class="jobi-card p-6">
                    <h3 class="text-xl font-black mb-4 border-b pb-2">פעילות אחרונה ✨</h3>
                    <div id="activity-log" class="text-center py-10 text-gray-400 italic text-sm">
                        עוד לא ביצעת פעולות במערכת...
                    </div>
                </div>
            </div>

            <div class="jobi-card p-6 border-dashed">
                <h3 class="text-xl font-black mb-6">הישגים שלי 🏆</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center text-2xl grayscale opacity-30 hover:grayscale-0 hover:opacity-100 transition cursor-help" title="עבודה ראשונה">💼</div>
                    <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center text-2xl grayscale opacity-30 transition">🔥</div>
                    <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center text-2xl grayscale opacity-30 transition">🌟</div>
                    <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center text-2xl grayscale opacity-30 transition">🚀</div>
                    <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center text-2xl grayscale opacity-30 transition">🤝</div>
                    <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center text-2xl grayscale opacity-30 transition">🎓</div>
                </div>
                <p class="text-[10px] text-gray-400 mt-6 font-bold">* הגש מועמדות למשרות כדי לפתוח את ההישגים!</p>
            </div>
        </div>
    </main>

    <script>
        // Загрузка данных
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('jobi_user'));
            if (!user) {
                window.location.href = '../account/login.html';
                return;
            }

            // Заполнение полей
            document.getElementById('user-name').textContent = `${user.firstName} ${user.lastName}`;
            document.getElementById('user-age').textContent = `גיל: ${user.age || '--'}`;
            if(user.avatar) document.getElementById('user-avatar').src = user.avatar;

            // Логика XP
            const xp = parseInt(localStorage.getItem('jobi_xp')) || 0;
            const level = Math.floor(xp / 100) + 1;
            const currentXP = xp % 100;

            document.getElementById('level-tag').textContent = `LVL ${level}`;
            document.getElementById('xp-current').textContent = currentXP;
            document.getElementById('xp-fill').style.width = `${currentXP}%`;

            renderNav(user);
        });

        function toggleMenu(open) {
            document.getElementById('side-menu').classList.toggle('active', open);
            document.getElementById('overlay').style.display = open ? 'block' : 'none';
        }

        function renderNav(user) {
            const nav = document.getElementById('nav-content');
            nav.innerHTML = `
                <a href="../index.html">🏠 דף הבית</a>
                <a href="my-jobs.html">💼 המשרות שלי</a>
                <a href="chat.html">💬 הודעות</a>
                <a href="settings.html">⚙️ הגדרות חשבון</a>
                <hr class="border-gray-100">
                <button onclick="logout()" class="text-red-500 text-right font-black">יציאה מהחשבון</button>
            `;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../account/login.html';
        }
    </script>
</body>
</html>
