<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה ל-Jobi</title>
    <link rel="icon" type="image/png" href="../../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/register.css">
</head>
<body class="p-4">

    <div id="custom-alert" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6 text-center">
        <div class="modal-content w-full max-w-xs p-8 shadow-2xl">
            <img id="alert-img" src="../../img/logo_reverse.png" class="h-20 mx-auto mb-4 object-contain">
            <h3 id="alert-title" class="text-xl font-black mb-2 text-gray-900"></h3>
            <p id="alert-text" class="text-gray-600 mb-6"></p>
            <button onclick="closeAlert()" class="btn-primary w-full py-2 rounded-xl text-black">אוקיי</button>
        </div>
    </div>

    <div class="register-card w-full max-w-lg">
        <div class="relative mb-12">
            <div class="banner-upload" onclick="document.getElementById('banner-input').click()">
                <img id="banner-preview" src="" class="preview-img hidden">
                <div id="banner-placeholder" class="flex items-center justify-center h-full text-gray-400 text-xs font-bold">לחץ להוספת תמונת רקע</div>
            </div>
            <div class="avatar-upload" onclick="document.getElementById('avatar-input').click()">
                <img id="avatar-preview" src="../../img/default-avatar.png" class="preview-img">
            </div>
            <input type="file" id="banner-input" class="hidden" accept="image/*" onchange="previewImage(this, 'banner-preview', 'banner-placeholder')">
            <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="previewImage(this, 'avatar-preview')">
        </div>

        <form id="register-form" class="px-8 pb-8 space-y-4">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-black text-gray-900">יצירת פרופיל חדש</h1>
                <p class="text-gray-500 text-xs italic">הצטרף לקהילת Jobi ומצא עבודה בקלות</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">שם מלא</label>
                    <input type="text" id="fullName" required class="input-field" placeholder="ישראל ישראלי">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">שם משתמש</label>
                    <input type="text" id="nickname" required class="input-field" placeholder="israel123">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">תאריך לידה</label>
                    <input type="date" id="birthDate" required class="input-field text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">עיר מגורים</label>
                    <select id="city" required class="input-field text-sm" 
        onfocus="this.size=5;" onblur="this.size=1;" onchange="this.size=1; this.blur();">
                        <option value="">בחר עיר...</option>
                        <option value="Abu Ghosh">אבו גוש</option>
                        <option value="Eilat">אילת</option>
                        <option value="El'ad">אלעד</option>
                        <option value="Ashdod">אשדוד</option>
                        <option value="Ashkelon">אשקלון</option>
                        <option value="Beersheba">באר שבע</option>
                        <option value="Beit Shemesh">בית שמש</option>
                        <option value="Beitar Illit">ביתר עילית</option>
                        <option value="Bnei Brak">בני ברק</option>
                        <option value="Bat Yam">בת ים</option>
                        <option value="Givatayim">גבעתיים</option>
                        <option value="Givat Shmuel">גבעת שמואל</option>
                        <option value="Gedera">גדרה</option>
                        <option value="Dimona">דימונה</option>
                        <option value="Hod HaSharon">הוד השרון</option>
                        <option value="Herzliya">הרצליה</option>
                        <option value="Hadera">חדרה</option>
                        <option value="Holon">חולון</option>
                        <option value="Haifa">חיפה</option>
                        <option value="Tiberias">טבריה</option>
                        <option value="Tayibe">טייבה</option>
                        <option value="Tira">טירה</option>
                        <option value="Tamra">טמרה</option>
                        <option value="Yavne">יבנה</option>
                        <option value="Yehud-Monosson">יהוד-מונוסון</option>
                        <option value="Jerusalem">ירושלים</option>
                        <option value="Kfar Saba">כפר סבא</option>
                        <option value="Lod">לוד</option>
                        <option value="Mevaseret Zion">מבשרת ציון</option>
                        <option value="Migdal HaEmek">מגדל העמק</option>
                        <option value="Modi'in-Maccabim-Re'ut">מודיעין-מכבים-רעות</option>
                        <option value="Modi'in Illit">מודיעין עילית</option>
                        <option value="Ma'ale Adumim">מעלה אדומים</option>
                        <option value="Ma'alot-Tarshiha">מעלות-תרשיחא</option>
                        <option value="Nahariya">נהריה</option>
                        <option value="Ness Ziona">נס ציונה</option>
                        <option value="Nazareth">נצרת</option>
                        <option value="Netanya">נתניה</option>
                        <option value="Netivot">נתיבות</option>
                        <option value="Sakhnin">סח'נין</option>
                        <option value="Afula">עפולה</option>
                        <option value="Arad">ערד</option>
                        <option value="Petah Tikva">פתח תקווה</option>
                        <option value="Safed">צפת</option>
                        <option value="Kiryat Ata">קרית אתא</option>
                        <option value="Kiryat Gat">קרית גת</option>
                        <option value="Kiryat Motzkin">קרית מוצקין</option>
                        <option value="Kiryat Ono">קרית אונו</option>
                        <option value="Rishon LeZion">ראשון לציון</option>
                        <option value="Rehovot">רחובות</option>
                        <option value="Ramla">רמלה</option>
                        <option value="Ramat Gan">רמת גן</option>
                        <option value="Ramat HaSharon">רמת השרון</option>
                        <option value="Ra'anana">רעננה</option>
                        <option value="Sderot">שדרות</option>
                        <option value="Tel Aviv">תל אביב</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 mr-1">אימייל</label>
                <input type="email" id="email" required class="input-field" placeholder="mail@example.com">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1 mr-1">סיסמה</label>
                <input type="password" id="password" required class="input-field" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-lg shadow-md mt-4">הירשם עכשיו</button>
            
            <p class="text-center text-sm text-gray-600 mt-4">
                כבר יש לך חשבון? <a href="login.html" class="text-orange-600 font-bold hover:underline">התחבר כאן</a>
            </p>
        </form>
    </div>

    <script type="module" src="../../js/register.js"></script>
</body>
</html>
