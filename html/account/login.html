<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה ל-Jobi</title>
    <link rel="icon" type="image/png" href="../../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/login.css">
</head>
<body class="p-4">

    <div id="custom-alert" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="modal-content w-full max-w-xs p-8 shadow-2xl text-center">
            <img id="alert-img" src="../../img/logo_reverse.png" class="h-20 mx-auto mb-4 object-contain">
            <h3 id="alert-title" class="text-xl font-black mb-2 text-gray-900">כותרת</h3>
            <p id="alert-text" class="text-gray-600 mb-6">הודעה כאן...</p>
            <button id="alert-btn" onclick="closeAlert()" class="btn-primary w-full py-2 rounded-xl text-black">אוקיי</button>
        </div>
    </div>

    <div id="reset-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[90] flex items-center justify-center p-4 text-center">
        <div class="bg-[#fefff1] border-2 border-[#feb900] w-full max-w-xs rounded-[25px] p-6 shadow-2xl">
            <h3 class="text-xl font-black mb-2">שחזור סיסמה</h3>
            <p class="text-xs text-gray-600 mb-4">נשלח לך אימייל עם קישור לאיפוס</p>
            <input type="email" id="reset-email" placeholder="הכנס אימייל" class="input-field w-full mb-4 text-right">
            <div class="flex gap-2">
                <button onclick="sendResetEmail()" class="btn-primary flex-1 py-2 rounded-xl">שלח</button>
                <button onclick="toggleModal('reset-modal', false)" class="bg-gray-200 flex-1 py-2 rounded-xl font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <div class="login-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <img src="../../img/logo_reverse.png" alt="Jobi" class="h-16 mx-auto mb-3">
            <h1 class="text-3xl font-black text-gray-900 leading-none">Jobi</h1>
            <p class="text-gray-500 text-sm mt-2 italic">הדרך שלך לעבודה ראשונה</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1 mr-1">אימייל</label>
                <input type="email" id="email" required class="input-field w-full text-right" placeholder="mail@example.com">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 mr-1">סיסמה</label>
                <input type="password" id="password" required class="input-field w-full text-right" placeholder="••••••••">
            </div>
            <div class="text-right">
                <button type="button" onclick="toggleModal('reset-modal', true)" class="text-xs font-bold text-orange-600 hover:underline">שכחת סיסמה?</button>
            </div>
            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-lg shadow-md mt-2">התחברות</button>
        </form>

        <div class="relative my-8">
            <hr class="border-gray-200">
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-gray-400 text-[10px] font-bold">או</span>
        </div>

        <button id="google-login-btn" type="button" class="w-full flex items-center justify-center gap-3 border-2 border-gray-100 py-3 rounded-xl hover:bg-gray-50 transition font-bold text-gray-700">
            <img src="../../img/google.png" alt="Google" class="w-5 h-5">
            התחברות עם Google
        </button>

        <p class="text-center mt-8 text-sm text-gray-600">
            אין לך חשבון? <a href="register.html" class="text-orange-600 font-bold hover:underline">הירשם עכשיו</a>
        </p>
    </div>

    <script type="module" src="../../js/login.js"></script>
</body>
</html>
