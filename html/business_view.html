<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — פרטי עסק</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f9fafb; }
        .neo-card { border: 4px solid black; box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); background: white; border-radius: 24px; transition: all 0.3s; }
        .neo-btn { border: 3px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: 0.1s; font-weight: 900; cursor: pointer; }
        .neo-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }
        
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 8px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 45px; color: #e5e7eb; cursor: pointer; transition: 0.2s; text-shadow: 2px 2px 0px #000; }
        .star-rating label:hover, .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #FFD700; transform: scale(1.1); }
        
        .star-rating.disabled label { pointer-events: none; color: #e5e7eb !important; opacity: 0.5; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
    </style>
</head>
<body class="pb-20 relative min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-24 h-24 border-8 border-black border-t-[#FFD700] rounded-full animate-spin shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mb-6"></div>
        <h2 id="loading-text" class="text-4xl font-black italic animate-pulse">בודק הרשאה...</h2>
    </div>

    <header class="bg-[#FFD700] p-4 sticky top-0 z-50 shadow-lg border-b-4 border-black mb-8">
        <div class="container mx-auto flex items-center justify-between max-w-4xl">
            <button onclick="window.location.href='main.html'" class="neo-btn bg-white px-5 py-2 rounded-xl italic text-lg flex items-center gap-2">
                <span>חזרה</span> <span>➔</span>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-3xl font-black italic tracking-tighter text-black">Jobi</span>
            </div>
        </div>
    </header>

    <main id="main-content" class="container mx-auto px-4 max-w-4xl hidden opacity-0 transition-opacity duration-500">
        
        <div class="neo-card overflow-hidden mb-10 p-6 md:p-8 relative">
            <div class="absolute top-6 left-6 bg-[#FFD700] border-4 border-black font-black px-4 py-2 rounded-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] text-2xl z-10">
                <span id="biz-rating-avg">0.0</span> ⭐ 
                <div class="text-[11px] opacity-70 text-center uppercase mt-1"><span id="biz-vote-count">0</span> הצבעות</div>
            </div>

            <div class="flex flex-col md:flex-row gap-8 items-start">
                <div class="w-full md:w-1/3 aspect-square border-4 border-black rounded-3xl overflow-hidden shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] bg-gray-100 flex-shrink-0">
                    <img id="biz-image" src="" class="w-full h-full object-cover" alt="לוגו">
                </div>
                
                <div class="flex-1 w-full">
                    <h1 id="biz-name" class="text-5xl font-black italic mb-2 text-black tracking-tighter text-right"></h1>

                    <p id="biz-desc" class="text-lg font-bold border-r-4 border-[#FFD700] pr-4 mb-8 leading-relaxed text-right"></p>

                    <div class="w-full mt-2 mb-6">
                        <p id="biz-location" class="text-xl font-bold text-gray-500 italic text-right flex flex-row-reverse items-start justify-start gap-2">
                            <span class="inline-block">📍</span>
                            <span class="break-words max-w-full"></span>
                        </p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8 text-right">
                        <div class="border-2 border-black p-3 rounded-xl bg-gray-50 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                            <span class="block text-xs font-black text-gray-500 uppercase">שעות פעילות</span>
                            <span id="biz-hours" class="font-bold text-lg"></span>
                        </div>
                        <div class="border-2 border-black p-3 rounded-xl bg-[#FFD700] shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                            <span class="block text-xs font-black text-black/60 uppercase">שכר לשעה</span>
                            <span class="font-black text-xl italic">₪<span id="biz-salary"></span></span>
                        </div>
                        <div class="border-2 border-black p-3 rounded-xl bg-gray-50 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                            <span class="block text-xs font-black text-gray-500 uppercase">גיל מינימלי</span>
                            <span class="font-black text-lg text-red-600"><span id="biz-age"></span>+</span>
                        </div>
                        <div class="border-2 border-black p-3 rounded-xl bg-gray-50 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                            <span class="block text-xs font-black text-gray-500 uppercase">דרישות</span>
                            <span id="biz-traits" class="font-bold text-sm leading-tight block mt-1"></span>
                        </div>
                    </div>

                    <a id="call-link" href="#" class="neo-btn bg-black text-[#FFD700] w-full block text-center py-4 text-3xl font-black italic rounded-2xl uppercase">📞 התקשר עכשיו</a>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-8">
                <div class="neo-card p-6 bg-white border-t-8 border-t-[#FFD700]">
                    <h3 class="text-2xl font-black italic mb-4 text-center text-black">דרג את העסק</h3>
                    <div class="star-rating" id="star-container">
                        <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                    </div>
                    <p id="rating-status" class="text-center font-black mt-4 hidden p-2 rounded-lg border-2"></p>
                </div>

                <div class="neo-card p-6 bg-black text-white">
                    <h3 class="text-2xl font-black italic mb-4 text-right text-[#FFD700]">כתוב ביקורת</h3>
                    <textarea id="comment-input" placeholder="איך הייתה החוויה שלך?" class="w-full p-4 border-4 border-[#FFD700] rounded-2xl font-bold h-32 focus:outline-none mb-4 text-black text-right"></textarea>
                    <button id="post-comment" class="neo-btn bg-[#FFD700] text-black w-full py-4 rounded-xl text-2xl italic hover:bg-white transition-colors">שלח עכשיו 🚀</button>
                </div>
            </div>

            <section>
                <h2 class="text-3xl font-black italic mb-6 border-b-4 border-black pb-2 inline-block text-black text-right w-full">מה הקהילה אומרת:</h2>
                <div id="comments-list" class="space-y-6"></div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ПРОВЕРКА АВТОРИЗАЦИИ (КАК В MAIN.JS) ---
        const userId = localStorage.getItem('user_id'); // Берем ID из localStorage, как в твоем main.js

        if (!userId) {
            // Если пользователя нет — перекидываем на логин
            window.location.href = 'login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const bizId = urlParams.get('id');
        let userHasRated = false;

        async function init() {
            if (!bizId) {
                alert("שגיאה: חסר מזהה עסק");
                window.location.href = 'main.html';
                return;
            }

            try {
                const docRef = doc(db, "businesses", bizId);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const d = snap.data();
                    // Рендерим данные
                    document.getElementById('biz-name').innerText = d.name || 'עסק ללא שם';
                    document.getElementById('biz-location').querySelector('span').innerText = d.location || 'לא צוין מיקום';
                    document.getElementById('biz-desc').innerText = d.description || 'אין תיאור זמין.';
                    document.getElementById('biz-hours').innerText = d.hours || 'לא צוין';
                    document.getElementById('biz-salary').innerText = d.defaultSalary || '0';
                    document.getElementById('biz-age').innerText = d.defaultAge || '14';
                    document.getElementById('biz-traits').innerText = d.traits || 'אין דרישות מיוחדות';
                    document.getElementById('call-link').href = 'tel:' + (d.phone || '');
                    document.getElementById('biz-image').src = d.logo || 'https://via.placeholder.com/400x400?text=Jobi';

                    // Показываем контент
                    document.getElementById('loading-screen').classList.add('opacity-0');
                    setTimeout(() => {
                        document.getElementById('loading-screen').classList.add('hidden');
                        const main = document.getElementById('main-content');
                        main.classList.remove('hidden');
                        setTimeout(() => main.classList.remove('opacity-0'), 50);
                    }, 500);

                    loadReviews();
                } else {
                    alert("העסק לא נמצא");
                    window.location.href = 'main.html';
                }
            } catch (error) {
                console.error("Load error:", error);
            }
        }

        // ОТПРАВКА ОЦЕНКИ
        document.querySelectorAll('input[name="rating"]').forEach(star => {
            star.onclick = async (e) => {
                if (userHasRated) {
                    alert("כבר דירגת את העסק הזה!");
                    e.preventDefault();
                    return;
                }

                const val = parseInt(e.target.value);
                document.getElementById('star-container').classList.add('disabled');
                
                try {
                    await addDoc(collection(db, "reviews"), {
                        businessId: bizId,
                        userId: userId, // Используем официальный user_id
                        rating: val,
                        type: "star",
                        createdAt: Date.now()
                    });
                    userHasRated = true;
                } catch (error) {
                    console.error("Star save error:", error);
                    document.getElementById('star-container').classList.remove('disabled');
                }
            };
        });

        // ОТПРАВКА ОТЗЫВА
        document.getElementById('post-comment').onclick = async () => {
            const inputEl = document.getElementById('comment-input');
            const text = inputEl.value.trim();
            if (text.length < 3) return alert("אנא כתוב ביקורת מפורטת יותר");

            const btn = document.getElementById('post-comment');
            btn.disabled = true;
            btn.innerText = "שולח...";

            try {
                await addDoc(collection(db, "reviews"), {
                    businessId: bizId,
                    userId: userId,
                    userName: 'משתמש Jobi',
                    text: text,
                    type: "text",
                    createdAt: Date.now()
                });
                inputEl.value = '';
                alert("הביקורת פורסמה בהצלחה!");
            } catch (error) {
                console.error("Comment error:", error);
            } finally {
                btn.disabled = false;
                btn.innerText = "שלח עכשיו 🚀";
            }
        };

        // ЗАГРУЗКА И ПОДСЧЕТ
        function loadReviews() {
            const q = query(collection(db, "reviews"), where("businessId", "==", bizId), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snap) => {
                const list = document.getElementById('comments-list');
                list.innerHTML = '';
                let sum = 0, count = 0;
                userHasRated = false;

                snap.forEach(d => {
                    const r = d.data();
                    
                    if (r.type === "star" && r.userId === userId) userHasRated = true;

                    if (r.type === "star" && r.rating) {
                        sum += r.rating;
                        count++;
                    } else if (r.type === "text" && r.text) {
                        const date = new Date(r.createdAt).toLocaleDateString('he-IL');
                        list.innerHTML += `
                            <div class="neo-card p-4 bg-white border-2 text-right">
                                <div class="flex justify-between items-center mb-2 flex-row-reverse">
                                    <p class="font-black text-sm text-[#feb900]">${r.userName || 'אנונימי'}</p>
                                    <p class="text-[10px] font-bold text-gray-400">${date}</p>
                                </div>
                                <p class="font-bold italic text-gray-800 leading-tight">${r.text}</p>
                            </div>`;
                    }
                });

                const statusEl = document.getElementById('rating-status');
                if (userHasRated) {
                    document.getElementById('star-container').classList.add('disabled');
                    statusEl.innerText = "כבר דירגת את העסק! ✓";
                    statusEl.className = "text-center font-black mt-4 p-2 rounded-lg border-2 bg-gray-50 border-gray-300 text-gray-500 block";
                } else {
                    document.getElementById('star-container').classList.remove('disabled');
                    statusEl.className = "hidden";
                }

                if (count > 0) {
                    document.getElementById('biz-rating-avg').innerText = (sum / count).toFixed(1);
                    document.getElementById('biz-vote-count').innerText = count;
                }
            });
        }

        init();
    </script>
</body>
</html>
