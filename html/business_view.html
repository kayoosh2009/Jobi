<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — פרטי עסק</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f0f0f0; color: #000; }
        .neo-card { border: 4px solid black; box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); background: white; border-radius: 32px; }
        .neo-btn { border: 3px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: 0.2s; font-weight: 900; cursor: pointer; }
        .neo-btn:active { transform: translate(3px, 3px); box-shadow: none; }
        
        /* Skeleton Animation */
        .skeleton { background: #e0e0e0; border-radius: 16px; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Star Rating System */
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 4px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 32px; color: #ccc; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #FFD700; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 sticky top-0 bg-[#f0f0f0]/90 backdrop-blur-md z-50">
        <div class="container mx-auto flex justify-between items-center">
            <button onclick="window.location.href='main.html'" class="neo-btn bg-white px-6 py-2 rounded-2xl italic">← חזרה</button>
            <span class="text-3xl font-black italic tracking-tighter">Jobi</span>
        </div>
    </header>

    <div id="skeleton-loader" class="container mx-auto px-4 max-w-4xl">
        <div class="skeleton h-64 md:h-80 w-full mb-8 border-4 border-black"></div>
        <div class="skeleton h-12 w-3/4 mb-4"></div>
        <div class="skeleton h-6 w-1/2 mb-10"></div>
    </div>

    <main id="main-content" class="hidden container mx-auto px-4 max-w-4xl">
        <div class="neo-card overflow-hidden mb-12">
            <div class="h-64 md:h-80 border-b-4 border-black relative bg-gray-200">
                <img id="biz-image" src="" class="w-full h-full object-cover">
                <div class="absolute bottom-6 right-6 bg-[#FFD700] border-4 border-black font-black px-4 py-2 rounded-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <span id="biz-rating-avg">0.0</span> ⭐
                </div>
            </div>

            <div class="p-6 md:p-10 text-right">
                <h1 id="biz-name" class="text-5xl font-black italic mb-2"></h1>
                <p id="biz-address" class="text-xl font-bold text-gray-500 mb-8 italic"></p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
                    <div class="border-4 border-black p-4 rounded-2xl bg-white">
                        <span class="block text-sm font-black text-gray-400">🕒 זמן עבודה</span>
                        <span id="biz-hours" class="text-lg font-black"></span>
                    </div>
                    <div class="border-4 border-black p-4 rounded-2xl bg-white">
                        <span class="block text-sm font-black text-gray-400">📧 אימייל Jobi</span>
                        <span id="biz-email" class="text-lg font-black break-all"></span>
                    </div>
                    <div class="border-4 border-black p-4 rounded-2xl bg-white">
                        <span class="block text-sm font-black text-gray-400">📞 טלפון ליצירת קשר</span>
                        <span id="biz-phone" class="text-lg font-black italic"></span>
                    </div>
                    <div class="border-4 border-black p-4 rounded-2xl bg-[#FFD700]">
                        <span class="block text-sm font-black text-black/50">💰 שכר לשעה</span>
                        <span class="text-2xl font-black italic">₪<span id="biz-salary"></span></span>
                    </div>
                </div>

                <div class="mb-10">
                    <h2 class="text-3xl font-black italic mb-4">תיאור העסק</h2>
                    <p id="biz-desc" class="text-xl font-bold leading-relaxed text-gray-800 italic"></p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <a id="call-link" href="" class="neo-btn bg-black text-[#FFD700] flex-1 text-center py-5 text-2xl italic">התקשר עכשיו</a>
                </div>
            </div>
        </div>

        <section class="pb-20">
            <h2 class="text-4xl font-black italic mb-8">ביקורות מהשטח</h2>
            
            <div class="neo-card p-6 mb-10 bg-[#FFD700]/10">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <span class="font-black italic">איך היה לך? דרג:</span>
                        <div class="star-rating">
                            <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                            <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                        </div>
                    </div>
                    <textarea id="comment-input" maxlength="500" placeholder="כתוב כאן... (עד 500 תווים)" class="w-full p-4 border-4 border-black rounded-2xl font-bold h-32 focus:outline-none focus:bg-white transition-all"></textarea>
                    <button id="post-comment" class="neo-btn bg-black text-white py-4 rounded-2xl text-xl italic">פרסם תגובה</button>
                </div>
            </div>

            <div id="comments-list" class="space-y-6">
                </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, where, orderBy, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const bizId = urlParams.get('id');
        const userId = localStorage.getItem('user_id');

        async function loadBusiness() {
            if (!bizId) return window.location.href = 'main.html';
            
            const docRef = doc(db, "businesses", bizId);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('biz-name').innerText = d.name;
                document.getElementById('biz-address').innerText = '📍 ' + (d.location || 'כתובת לא צוינה');
                document.getElementById('biz-email').innerText = d.email;
                document.getElementById('biz-phone').innerText = d.phone;
                document.getElementById('biz-hours').innerText = d.hours || 'לא צוין';
                document.getElementById('biz-salary').innerText = d.defaultSalary || '40';
                document.getElementById('biz-desc').innerText = d.description;
                document.getElementById('biz-image').src = d.logo || 'img/default.png';
                document.getElementById('call-link').href = 'tel:' + d.phone;

                document.getElementById('skeleton-loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                loadComments();
            }
        }

        function loadComments() {
            const q = query(collection(db, "reviews"), where("businessId", "==", bizId), orderBy("likes", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('comments-list');
                list.innerHTML = '';
                let totalRating = 0;
                
                snap.forEach(d => {
                    const r = d.data();
                    const id = d.id;
                    totalRating += r.rating;
                    list.innerHTML += `
                        <div class="neo-card p-6 bg-white flex flex-col gap-4 relative">
                            <div class="flex items-center gap-4">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${r.userName}" class="w-12 h-12 border-2 border-black rounded-full bg-[#FFD700]">
                                <div>
                                    <h4 class="font-black italic">${r.userName}</h4>
                                    <span class="text-yellow-500">${'★'.repeat(r.rating)}</span>
                                </div>
                                <div class="mr-auto group relative">
                                    <button class="font-black text-2xl">⋮</button>
                                    <div class="hidden group-hover:block absolute left-0 top-8 bg-white border-2 border-black rounded-xl shadow-xl z-10 overflow-hidden w-32">
                                        <button onclick="window.like('${id}')" class="w-full p-2 text-right font-bold hover:bg-green-50 border-b-2 border-black">👍 אהבתי</button>
                                        <button onclick="window.report('${id}')" class="w-full p-2 text-right font-bold hover:bg-red-50 text-red-500">🚩 דווח</button>
                                    </div>
                                </div>
                            </div>
                            <p class="font-bold italic text-gray-700">${r.text}</p>
                            <div class="text-xs font-black opacity-30">${r.likes || 0} תומכים בביקורת זו</div>
                        </div>
                    `;
                });
                
                if (snap.size > 0) {
                    document.getElementById('biz-rating-avg').innerText = (totalRating / snap.size).toFixed(1);
                }
            });
        }

        document.getElementById('post-comment').onclick = async () => {
            if (!userId) return window.location.href = 'login.html';
            
            const text = document.getElementById('comment-input').value;
            const ratingInput = document.querySelector('input[name="rating"]:checked');
            
            if (!ratingInput || text.length < 5) return alert("אנא בחר דירוג וכתוב תגובה עניינית");

            await addDoc(collection(db, "reviews"), {
                businessId: bizId,
                userId: userId,
                userName: localStorage.getItem('user_name') || 'משתמש Jobi',
                text: text,
                rating: parseInt(ratingInput.value),
                likes: 0,
                createdAt: Date.now()
            });
            
            document.getElementById('comment-input').value = '';
            alert("תודה על השיתוף!");
        };

        window.like = async (id) => {
            await updateDoc(doc(db, "reviews", id), { likes: increment(1) });
        };

        window.report = async (id) => {
            await addDoc(collection(db, "reports"), { reviewId: id, reportedBy: userId, time: Date.now() });
            alert("דיווח נשלח למערכת.");
        };

        loadBusiness();
    </script>
</body>
</html>
