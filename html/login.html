<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — כניסה למערכת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #FFD700; }
        .login-card { 
            background: white; 
            border: 4px solid black; 
            box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); 
        }
        .auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 3px solid black;
            border-radius: 12px;
            font-weight: 900;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .auth-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="login-card w-full max-w-md p-8 rounded-3xl relative">
        <a href="../index.html" class="absolute -top-6 -right-2 bg-white border-2 border-black px-4 py-2 rounded-xl font-black text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-gray-100 active:translate-y-1 active:shadow-none transition-all">
            ⬅ חזרה לבית
        </a>

        <div class="text-center mb-10">
            <img src="img/logo.png" alt="Jobi" class="h-16 mx-auto mb-4 drop-shadow-md">
            <h1 class="text-4xl font-black italic tracking-tighter">כניסה ל-Jobi</h1>
            <p class="text-gray-500 font-bold mt-2 italic">התחבר והתחל להרוויח!</p>
        </div>

        <div class="auth-options">
            <button onclick="auth('google')" class="auth-btn bg-white hover:bg-red-50">
                <img src="img/google.png" class="h-6 w-6">
                התחברות עם Google
            </button>

            <button onclick="auth('microsoft')" class="auth-btn bg-white hover:bg-blue-50">
                <img src="img/microsoft.png" class="h-6 w-6">
                התחברות עם Microsoft
            </button>

            <button onclick="auth('github')" class="auth-btn bg-black text-white hover:bg-gray-800">
                <img src="img/github.png" class="h-6 w-6 invert">
                התחברות עם GitHub
            </button>
        </div>

        <div class="mt-8 text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Powered by Jobi IL</p>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
