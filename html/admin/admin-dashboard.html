<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Admin — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f0f0f0; }
        .stat-card {
            background: white;
            border: 4px solid black;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translate(-2px, -2px); }
        .action-btn {
            background: #FFD700;
            border: 4px solid black;
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            transition: all 0.2s;
        }
        .action-btn:active {
            box-shadow: none;
            transform: translate(4px, 4px);
        }
        .logout-btn {
            border: 2px solid black;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: #ff4444; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-10 bg-white p-6 border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] rounded-3xl">
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Admin <span class="text-[#feb900]">Panel</span></h1>
            <p id="admin-welcome" class="font-bold text-gray-500 italic text-sm italic">שלום, מנהל מערכת</p>
        </div>
        <button onclick="logout()" class="logout-btn font-black px-6 py-2 rounded-xl italic">התנתק</button>
    </header>

    <main class="max-w-6xl mx-auto">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="stat-card p-8 rounded-3xl flex items-center justify-between">
                <div>
                    <p class="text-gray-500 font-black uppercase text-xs tracking-widest mb-1">משתמשים רשומים</p>
                    <h2 id="count-users" class="text-6xl font-black italic tracking-tighter">--</h2>
                </div>
                <div class="text-5xl">👤</div>
            </div>

            <div class="stat-card p-8 rounded-3xl flex items-center justify-between">
                <div>
                    <p class="text-gray-500 font-black uppercase text-xs tracking-widest mb-1">עסקים במערכת</p>
                    <h2 id="count-biz" class="text-6xl font-black italic tracking-tighter">--</h2>
                </div>
                <div class="text-5xl">💼</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button onclick="window.location.href='register_business.html'" class="action-btn p-6 rounded-2xl flex flex-col items-center gap-3 text-center">
                <span class="text-4xl">➕</span>
                <span class="text-xl font-black italic uppercase">רישום עסק חדש</span>
            </button>
            
            <button class="stat-card p-6 rounded-2xl flex flex-col items-center gap-3 text-center opacity-50 cursor-not-allowed">
                <span class="text-4xl">📜</span>
                <span class="text-xl font-black italic uppercase italic">ניהול משרות (בקרוב)</span>
            </button>

            <button class="stat-card p-6 rounded-2xl flex flex-col items-center gap-3 text-center opacity-50 cursor-not-allowed">
                <span class="text-4xl">⚠️</span>
                <span class="text-xl font-black italic uppercase italic">דיווחים ומשתמשים</span>
            </button>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Проверка авторизации
        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== "kayoosh2009@gmail.com") {
                window.location.href = "admin-login.html";
            } else {
                updateStats();
            }
        });

        // Загрузка реальных цифр из базы
        async function updateStats() {
            try {
                // Считаем юзеров
                const userColl = collection(db, "users");
                const userSnap = await getCountFromServer(userColl);
                document.getElementById('count-users').innerText = userSnap.data().count;

                // Считаем бизнесы
                const bizColl = collection(db, "businesses");
                const bizSnap = await getCountFromServer(bizColl);
                document.getElementById('count-biz').innerText = bizSnap.data().count;
            } catch (err) {
                console.error("Error fetching stats:", err);
            }
        }

        window.logout = () => {
            signOut(auth).then(() => {
                localStorage.removeItem('admin_token');
                window.location.href = "admin-login.html";
            });
        }
    </script>
</body>
</html>
