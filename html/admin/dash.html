<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Admin — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Heebo', sans-serif; }
        .stat-card { background: #151515; border: 1px solid #333; transition: 0.3s; }
        .stat-card:hover { border-color: #feb900; }
        .accent-color { color: #feb900; }
        .bg-accent { background-color: #feb900; }
    </style>
</head>
<body>

    <nav class="bg-black border-b border-[#feb900] p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="../img/logo.png" class="h-8">
            <span class="font-black text-xl italic text-white">JOBI <span class="accent-color">ADMIN</span></span>
        </div>
        <div class="flex items-center gap-6">
            <div id="system-clock" class="font-mono text-xl accent-color font-bold">00:00:00</div>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1 rounded-lg font-bold text-sm transition">LOGOUT</button>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <header class="mb-10">
            <h1 class="text-4xl font-black mb-2">לוח בקרה</h1>
            <p class="text-gray-400">ניהול מערכת Jobi בזמן אמת</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
            <div class="stat-card p-8 rounded-3xl">
                <p class="text-gray-400 text-sm font-bold mb-1">סה"כ משתמשים (נוער)</p>
                <h2 id="count-users" class="text-5xl font-black accent-color">...</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl">
                <p class="text-gray-400 text-sm font-bold mb-1">עסקים רשומים</p>
                <h2 id="count-businesses" class="text-5xl font-black accent-color">...</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl flex flex-col justify-center bg-white/5">
                <a href="new/business.html" class="bg-accent text-black text-center py-4 rounded-2xl font-black text-xl hover:scale-105 transition shadow-lg">
                    + הוסף עסק חדש
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="stat-card p-6 rounded-3xl">
                <h3 class="text-xl font-black mb-6 border-b border-gray-800 pb-4 accent-color">פעולות מהירות</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button class="p-4 bg-gray-800 rounded-xl font-bold hover:bg-gray-700 transition text-sm text-center">ניהול משרות</button>
                    <button class="p-4 bg-gray-800 rounded-xl font-bold hover:bg-gray-700 transition text-sm text-center">חסימת משתמש</button>
                    <button class="p-4 bg-gray-800 rounded-xl font-bold hover:bg-gray-700 transition text-sm text-center">שלח התראה</button>
                    <button class="p-4 bg-gray-800 rounded-xl font-bold hover:bg-gray-700 transition text-sm text-center">גיבוי נתונים</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Проверка прав (Kayoosh Only)
        if (localStorage.getItem('jobi_admin') !== 'true') {
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция обновления времени
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('he-IL', { hour12: false });
            document.getElementById('system-clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Загрузка реальных цифр из Firebase
        async function fetchStats() {
            try {
                // Считаем пользователей
                const usersSnap = await getDocs(collection(db, "users"));
                document.getElementById('count-users').textContent = usersSnap.size.toLocaleString();

                // Считаем бизнесы
                const bizSnap = await getDocs(collection(db, "businesses"));
                document.getElementById('count-businesses').textContent = bizSnap.size.toLocaleString();
            } catch (error) {
                console.error("Error fetching stats:", error);
                document.getElementById('count-users').textContent = "ERR";
                document.getElementById('count-businesses').textContent = "ERR";
            }
        }

        window.logout = () => {
            localStorage.removeItem('jobi_admin');
            window.location.href = 'index.html';
        };

        fetchStats();
    </script>
</body>
</html>
