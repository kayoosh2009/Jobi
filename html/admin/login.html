<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Admin — כניסת מנהל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f0f0f0; }
        .admin-card {
            border: 8px solid black;
            box-shadow: 15px 15px 0px 0px rgba(0,0,0,1);
            background: white;
        }
        .google-btn {
            background: white;
            border: 4px solid black;
            box-shadow: 6px 6px 0px 0px #FFD700;
            transition: all 0.2s;
        }
        .google-btn:active {
            box-shadow: none;
            transform: translate(4px, 4px);
        }
        .status-dot {
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full admin-card p-10 rounded-[40px] text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-4 bg-black"></div>
        
        <div class="mb-8">
            <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-2">Admin</h1>
            <div class="flex justify-center items-center">
                <span class="status-dot"></span>
                <p class="font-bold text-gray-500 italic uppercase text-xs tracking-widest">System Access Only</p>
            </div>
        </div>

        <div id="auth-container">
            <p class="mb-8 font-bold text-lg leading-tight text-right">שלום, כניסה למערכת הניהול מתבצעת באמצעות חשבון Google מורשה בלבד.</p>
            
            <button id="login-google" class="w-full py-4 google-btn flex items-center justify-center gap-4 group">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 h-6">
                <span class="text-xl font-black italic uppercase">Login with Google</span>
            </button>
        </div>

        <div id="error-msg" class="hidden mt-6 p-4 bg-red-100 border-4 border-red-600 rounded-2xl text-red-600 font-black italic">
            גישה נדחתה. המשתמש אינו מורשה.
        </div>

        <div id="loading" class="hidden mt-6 font-black italic animate-bounce">
            בודק הרשאות...
        </div>

        <div class="mt-10 pt-6 border-t-4 border-black/10">
            <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em]">Authorized Personnel Only / Kayoosh System</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Твой конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const adminEmail = "kayoosh2009@gmail.com"; // Твоя почта

        document.getElementById('login-google').onclick = async () => {
            const errorDiv = document.getElementById('error-msg');
            const loading = document.getElementById('loading');
            
            errorDiv.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Главная проверка
                if (user.email === adminEmail) {
                    localStorage.setItem('admin_token', 'active_session_admin');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Если зашел кто-то другой — выкидываем
                    await auth.signOut();
                    loading.classList.add('hidden');
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                loading.classList.add('hidden');
                errorDiv.innerText = "שגיאת התחברות. נסה שוב.";
                errorDiv.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
