<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Admin — Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Heebo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .admin-box { border: 2px solid #feb900; box-shadow: 0 0 30px rgba(254, 185, 0, 0.15); transition: 0.3s; }
        .admin-box:focus-within { box-shadow: 0 0 40px rgba(254, 185, 0, 0.3); }
        input { background: #111 !important; color: white !important; border: 1px solid #333 !important; }
        input:focus { border-color: #feb900 !important; outline: none; }
        .loader { border-top-color: #000; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="admin-box bg-black p-10 rounded-[40px] w-full max-w-sm text-center">
        <div class="mb-8">
            <img src="../img/logo.png" class="h-16 mx-auto mb-4 grayscale opacity-80">
            <h1 class="text-white text-2xl font-black italic tracking-tighter">JOBI <span class="text-[#feb900]">ROOT</span></h1>
            <p class="text-gray-500 text-xs font-bold mt-2 uppercase tracking-widest">Authorized Personnel Only</p>
        </div>
        
        <form id="admin-login-form" class="space-y-4">
            <div class="relative">
                <input type="email" id="email" placeholder="Admin Email" required 
                       class="w-full p-4 rounded-2xl text-right font-bold transition-all">
            </div>
            <div class="relative">
                <input type="password" id="pass" placeholder="Password" required 
                       class="w-full p-4 rounded-2xl text-right font-bold transition-all">
            </div>
            
            <div id="error" class="text-red-500 text-sm font-black hidden bg-red-500/10 py-2 rounded-xl">גישה נדחתה</div>
            
            <button type="submit" id="submit-btn" class="w-full bg-[#feb900] text-black font-black py-4 rounded-2xl hover:bg-yellow-500 transition-all flex items-center justify-center gap-3">
                <span>ENTER SYSTEM</span>
                <div id="loader" class="hidden w-5 h-5 border-2 border-transparent loader rounded-full"></div>
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('admin-login-form');
        const btn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const errDiv = document.getElementById('error');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Сброс состояния
            errDiv.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;

            // Двойная проверка: Email должен быть именно твоим
            if (email !== 'kayoosh@jobi.israel') {
                showError("אין לך הרשאות ניהול");
                return;
            }

            try {
                // Реальная проверка через Firebase
                await signInWithEmailAndPassword(auth, email, pass);
                
                // Если всё ок, ставим метку сессии
                localStorage.setItem('jobi_admin', 'true');
                window.location.href = 'dash.html';
                
            } catch (error) {
                showError("פרטי התחברות שגויים");
            }
        };

        function showError(msg) {
            errDiv.textContent = msg;
            errDiv.classList.remove('hidden');
            loader.classList.add('hidden');
            btn.disabled = false;
        }
    </script>
</body>
</html>
