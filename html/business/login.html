<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Business — כניסת מעסיקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f0f0f0; }
        
        /* Тот самый желтый градиент как на баннерах */
        .yellow-gradient { 
            background: linear-gradient(135deg, #FFD700 0%, #feb900 100%); 
        }

        /* Нео-брутализм инпуты */
        .neo-input {
            border: 4px solid black;
            box-shadow: 4px 4px 0px 0px rgba(255, 215, 0, 1); /* Желтая тень */
            transition: all 0.2s;
        }
        .neo-input:focus {
            box-shadow: none;
            border-color: #feb900;
            transform: translate(2px, 2px);
        }

        /* Кнопка в стиле главной */
        .neo-btn {
            background-color: black;
            color: #FFD700;
            border: 4px solid black;
            box-shadow: 6px 6px 0px 0px rgba(255, 215, 0, 1);
            transition: all 0.2s;
        }
        .neo-btn:active {
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        .login-card {
            border: 6px solid black;
            box-shadow: 12px 12px 0px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gray-50">

    <div class="max-w-md w-full bg-white p-8 login-card rounded-[40px] relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-4 yellow-gradient border-b-4 border-black"></div>

        <div class="text-center mt-4 mb-10">
            <div class="flex justify-center items-center gap-2 mb-2">
                <img src="../img/logo.png" class="h-10 w-10 drop-shadow-md">
                <h1 class="text-4xl font-black italic uppercase tracking-tighter text-black">Jobi <span class="text-[#feb900]">Biz</span></h1>
            </div>
            <p class="font-bold text-gray-500 italic uppercase text-xs tracking-widest">מערכת ניהול מעסיקים</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block font-black mb-2 italic text-lg text-black">אימייל עסקי:</label>
                <input type="email" id="email" placeholder="name@jobi.israel" required
                       class="w-full p-4 neo-input outline-none font-black text-lg rounded-2xl">
            </div>

            <div>
                <label class="block font-black mb-2 italic text-lg text-black">סיסמה:</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" required
                           class="w-full p-4 neo-input outline-none font-black text-lg rounded-2xl">
                    <button type="button" id="toggle-pass" class="absolute left-4 top-1/2 -translate-y-1/2 hover:scale-110 transition active:scale-90">
                        <img src="../img/lock.png" class="w-7 h-7" alt="Показать">
                    </button>
                </div>
            </div>

            <div id="error-msg" class="hidden text-red-600 font-black text-center italic text-sm p-2 bg-red-50 border-2 border-red-600 rounded-xl"></div>

            <button type="submit" class="w-full py-5 neo-btn text-2xl font-black italic uppercase rounded-2xl mt-4">
                כניסה ללוח הבקרה
            </button>
        </form>

        <div class="mt-10 text-center border-t-4 border-[#FFD700] pt-6">
            <a href="../main.html" class="font-black hover:text-[#feb900] transition-colors italic text-lg flex items-center justify-center gap-2">
                <span>🏠</span> חזרה לדף הבית
            </a>
        </div>
    </div>

    <script type="module" src="../../js/bussines_login.js"></script>
</body>
</html>
