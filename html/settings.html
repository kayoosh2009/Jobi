<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — הגדרות פרופיל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f0f0f0; }
        .settings-card { background: white; border: 4px solid black; box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); }
        .input-field { 
            width: 100%; padding: 12px; border: 3px solid black; border-radius: 12px; 
            font-weight: 700; outline: none; transition: 0.2s;
        }
        .input-field:focus { border-color: #FFD700; background-color: #fffdf0; }
        label { font-weight: 900; font-size: 0.9rem; margin-bottom: 5px; display: block; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="settings-card max-w-2xl mx-auto rounded-3xl overflow-hidden">
        <div class="bg-[#FFD700] p-6 border-b-4 border-black flex justify-between items-center">
            <h1 class="text-3xl font-black italic">הגדרות פרופיל ⚙️</h1>
            <a href="profile.html" class="bg-white border-2 border-black px-4 py-2 rounded-xl font-black text-sm shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">ביטול</a>
        </div>

        <form id="settings-form" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label>שם מלא (פי"ה)</label>
                    <input type="text" id="set-fullname" class="input-field" placeholder="ישראל ישראלי">
                </div>
                <div>
                    <label>תאריך לידה</label>
                    <input type="date" id="set-dob" class="input-field">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label>עיר</label>
                    <select id="set-city" class="input-field">
                        <option value="Tel Aviv">תל אביב</option>
                        <option value="Haifa">חיפה</option>
                        <option value="Jerusalem">ירושלים</option>
                        <option value="Ashdod">אשדוד</option>
                        <option value="Beersheba">באר שבע</option>
                    </select>
                </div>
                <div>
                    <label>איזור / שכונה</label>
                    <input type="text" id="set-district" class="input-field" placeholder="מרכז העיר">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t-2 border-gray-100 pt-6">
                <div>
                    <label>Telegram (ניקנייים)</label>
                    <input type="text" id="set-tg" class="input-field" placeholder="@username">
                </div>
                <div>
                    <label>מספר טלפון</label>
                    <input type="tel" id="set-phone" class="input-field" placeholder="050-000-0000">
                </div>
            </div>

            <div class="space-y-4 border-t-2 border-gray-100 pt-6">
                <div>
                    <label>כישורים (הפרד בפסיק)</label>
                    <input type="text" id="set-skills" class="input-field" placeholder="עריכת וידאו, גרפיקה, מכירות">
                </div>
                <div>
                    <label>זמינות (שעות חופשיות)</label>
                    <textarea id="set-schedule" class="input-field h-24" placeholder="לדוגמה: ימי חול 16:00-20:00"></textarea>
                </div>
            </div>

            <div class="flex items-center gap-3 bg-yellow-50 p-4 rounded-2xl border-2 border-dashed border-[#FFD700]">
                <input type="checkbox" id="set-parent-auth" class="w-6 h-6 border-2 border-black rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                <label for="set-parent-auth" class="mb-0 cursor-pointer italic">יש לי אישור מההורים לעבוד 🛡️</label>
            </div>

            <button type="submit" class="w-full bg-black text-[#FFD700] font-black py-5 rounded-2xl text-xl shadow-[6px_6px_0px_0px_rgba(255,215,0,1)] hover:scale-[1.02] active:translate-y-1 active:shadow-none transition-all italic">
                שמור שינויים ✅
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            databaseURL: "https://jobi-il-default-rtdb.firebaseio.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userId = localStorage.getItem('user_id');

        if (!userId) {
            window.location.href = 'login.html';
        }

        const form = document.getElementById('settings-form');

        // Загружаем текущие данные при входе
        const userRef = ref(db, 'users/' + userId);
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('set-fullname').value = data.fullName || '';
                document.getElementById('set-dob').value = data.dob || '';
                document.getElementById('set-city').value = data.city || 'Tel Aviv';
                document.getElementById('set-district').value = data.district || '';
                document.getElementById('set-tg').value = data.tg || '';
                document.getElementById('set-phone').value = data.phone || '';
                document.getElementById('set-skills').value = data.skills || '';
                document.getElementById('set-schedule').value = data.schedule || '';
                document.getElementById('set-parent-auth').checked = data.parentAuth || false;
            }
        });

        // Сохранение
        form.onsubmit = async (e) => {
            e.preventDefault();
            const updateData = {
                fullName: document.getElementById('set-fullname').value,
                dob: document.getElementById('set-dob').value,
                city: document.getElementById('set-city').value,
                district: document.getElementById('set-district').value,
                tg: document.getElementById('set-tg').value,
                phone: document.getElementById('set-phone').value,
                skills: document.getElementById('set-skills').value,
                schedule: document.getElementById('set-schedule').value,
                parentAuth: document.getElementById('set-parent-auth').checked
            };

            try {
                await set(ref(db, 'users/' + userId), updateData);
                alert('הנתונים נשמרו בהצלחה!');
                window.location.href = 'profile.html';
            } catch (error) {
                alert('שגיאה בשמירה: ' + error.message);
            }
        };
    </script>
</body>
</html>
