<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — עבודות לנוער</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu(false)"></div>

    <div id="ad-modal" class="hidden fixed inset-0 flex items-center justify-center z-[200] p-4 bg-black/40">
        <div class="bg-white border-4 border-[#feb900] rounded-[25px] p-8 max-w-xs text-center shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-black italic">עוברים לטלגרם?</h3>
            <p class="text-gray-600 mb-6 font-bold">האם ברצונך לעבור לערוץ הרשמי של Jobi?</p>
            <div class="flex gap-2">
                <a id="ad-link" href="https://t.me/jobi_israel" target="_blank" onclick="closeAdModal()" class="bg-[#feb900] flex-1 py-2 rounded-xl font-black text-center text-black">כן, קח אותי</a>
                <button onclick="closeAdModal()" class="bg-gray-200 flex-1 py-2 rounded-xl font-bold text-black">ביטול</button>
            </div>
        </div>
    </div>

    <div id="side-menu" class="side-menu p-6 text-right flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button onclick="toggleMenu(false)" class="text-2xl font-bold">✕</button>
            <img src="img/logo.png" class="h-8">
        </div>
        
        <div id="user-card-menu" class="hidden mb-6 p-4 bg-gray-50 rounded-2xl border-2 border-[#feb900] flex items-center gap-3">
            <img id="menu-avatar" src="img/profile.png" class="h-12 w-12 rounded-full border border-black object-cover">
            <div class="flex flex-col">
                <span id="menu-username" class="font-black text-sm">שם משתמש</span>
                <span class="text-[10px] bg-black text-white px-2 py-0.5 rounded-full w-fit">Level 1</span>
            </div>
        </div>

        <nav id="nav-content" class="flex flex-col gap-5 font-bold text-lg">
            </nav>
    </div>

    <header class="navbar-jobi p-3 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2 flex-shrink-0">
                <img src="img/logo.png" alt="Jobi" class="h-10 w-auto">
                <div class="flex flex-col leading-tight">
                    <span class="text-2xl font-black text-black italic">Jobi</span>
                    <span class="text-[9px] text-gray-800 font-bold opacity-70">מצא את העבודה שלך</span>
                </div>
            </div>

            <form action="app/func/search.html" method="GET" class="hidden md:flex flex-grow items-center bg-white rounded-full px-4 py-1 max-w-md border-2 border-black/10 focus-within:border-black transition">
                <input type="text" name="q" placeholder="חפש משרה..." class="w-full py-2 text-right bg-transparent outline-none text-gray-700 font-bold">
                <button type="submit"><img src="img/search.png" class="h-5 w-5 opacity-60 hover:opacity-100 transition"></button>
            </form>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex gap-3">
                    <a href="https://t.me/jobi_israel"><img src="img/telegram.png" class="h-7 w-7 hover:scale-110 transition"></a>
                </div>
                
                <div class="flex items-center gap-2 bg-white/30 p-1 pr-3 rounded-full border border-white/40">
                    <a href="app/profile.html">
                        <img id="nav-avatar" src="img/profile.png" alt="Profile" class="h-9 w-9 rounded-full border-2 border-white object-cover">
                    </a>
                    <div class="burger-btn" onclick="toggleMenu(true)">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">

        <div class="banner-container mb-10 shadow-lg cursor-pointer" onclick="openAdModal('https://t.me/jobi_israel')">
            <div class="banner-slide" style="background-image: url('img/banner.png');"></div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b-4 border-[#feb900] pb-4">
            <h2 class="text-3xl font-black italic">משרות בשבילך ✨</h2>
            
            <div class="flex flex-wrap gap-2 items-center bg-white/60 p-2 rounded-xl shadow-sm">
                <img src="img/filter.png" class="h-4 w-4 ml-2">
                <select id="f-city" class="filter-select"><option>כל הארץ</option><option>תל אביב</option><option>באר שבע</option></select>
                <select id="f-lang" class="filter-select">
                    <option>שפה...</option>
                    <option>עברית</option>
                    <option>רוסית</option>
                    <option>אנגלית</option>
                </select>
                <select id="f-rate" class="filter-select"><option>דירוג ⭐</option><option>4.5+</option></select>
            </div>
        </div>

        <div id="jobs-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    
        // Конфиг Firebase (используем тот же, что в регистрации бизнеса)
        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
    
        // --- ФУНКЦИЯ ЗАГРУЗКИ КАРТОЧЕК ---
        async function loadJobs() {
            const jobsList = document.getElementById('jobs-list');
            
            try {
                // Получаем все документы из коллекции "businesses"
                const querySnapshot = await getDocs(collection(db, "businesses"));
                
                if (querySnapshot.empty) {
                    jobsList.innerHTML = "<p class='col-span-full text-center py-10 text-gray-400 font-bold'>כרגע אין משרות זמינות. בדוק שוב מאוחר יותר!</p>";
                    return;
                }
    
                jobsList.innerHTML = ""; // Очищаем текст "טוען..."
    
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Создаем HTML карточки на основе данных из Firestore
                    const card = `
                        <div class="job-card shadow-lg hover:shadow-xl transition-all cursor-pointer group" onclick="location.href='app/job-page.html?id=${doc.id}'">
                            <div class="h-32 bg-gray-100 relative overflow-hidden">
                                <img src="img/banner.png" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                                <div class="absolute bottom-2 right-2 bg-black/70 text-white text-[10px] px-2 py-1 rounded-lg font-bold">
                                    ${data.address || 'כתובת לא צוינה'}
                                </div>
                            </div>
                            <div class="p-4 text-right">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-1 rounded-md italic">חדש!</span>
                                    <h3 class="text-xl font-black text-gray-900">${data.bizName}</h3>
                                </div>
                                <p class="text-gray-500 text-xs mb-4 line-clamp-2 font-medium">${data.description || 'אין תיאור זמין'}</p>
                                
                                <div class="flex items-center justify-between border-t border-gray-100 pt-3">
                                    <div class="flex flex-col items-start">
                                        <span class="text-[10px] text-gray-400 font-bold leading-none">שכר לשעה</span>
                                        <span class="text-[#feb900] font-black text-lg">₪${data.salaryMax || '??'}</span>
                                    </div>
                                    <div class="flex items-center gap-1 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">
                                        <span class="text-sm font-black">${data.age || '16'}+</span>
                                        <span class="text-[10px] text-gray-500 font-bold">גיל</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    jobsList.innerHTML += card;
                });
            } catch (error) {
                console.error("Error loading jobs:", error);
                jobsList.innerHTML = "<p class='col-span-full text-center text-red-500'>שגיאה בטעינת הנתונים</p>";
            }
        }
    
        // --- ОСТАЛЬНАЯ ЛОГИКА МЕНЮ ---
        window.toggleMenu = (open) => {
            document.getElementById('side-menu').classList.toggle('active', open);
            document.getElementById('overlay').style.display = open ? 'block' : 'none';
        };
    
        window.logout = () => {
            localStorage.clear();
            location.reload();
        };
    
        function renderNav() {
            const user = JSON.parse(localStorage.getItem('jobi_user'));
            const nav = document.getElementById('nav-content');
            const userCard = document.getElementById('user-card-menu');
            
            if (user) {
                userCard.classList.remove('hidden');
                document.getElementById('menu-username').textContent = user.firstName + " " + (user.lastName || "");
                if(user.avatar) {
                    document.getElementById('menu-avatar').src = user.avatar;
                    document.getElementById('nav-avatar').src = user.avatar;
                }
    
                nav.innerHTML = `
                    <a href="app/profile.html" class="hover:text-[#feb900] transition-colors">👤 הפרופיל שלי</a>
                    <a href="app/my-jobs.html" class="hover:text-[#feb900] transition-colors">💼 המשרות שלי</a>
                    <a href="app/chat.html" class="hover:text-[#feb900] transition-colors">💬 הודעות</a>
                    <a href="app/settings.html" class="hover:text-[#feb900] transition-colors text-sm text-gray-400 mt-4">⚙️ הגדרות חשבון</a>
                    <button onclick="logout()" class="text-red-500 mt-6 text-right font-black italic">יציאה מהחשבון</button>
                `;
            } else {
                userCard.classList.add('hidden');
                nav.innerHTML = `
                    <p class="text-sm text-gray-500 mb-2 font-normal italic">היי, אורח!</p>
                    <a href="account/login.html" class="bg-[#feb900] text-center p-3 rounded-2xl text-black shadow-md font-bold">התחברות</a>
                    <a href="account/register.html" class="border-2 border-[#feb900] text-center p-3 rounded-2xl text-black font-bold">הרשמה ל-Jobi</a>
                `;
            }
        }
    
        window.openAdModal = (url) => {
            document.getElementById('ad-link').href = url;
            document.getElementById('ad-modal').classList.remove('hidden');
        };
        window.closeAdModal = () => document.getElementById('ad-modal').classList.add('hidden');
    
        // Запускаем всё
        renderNav();
        loadJobs();
    </script>
</body>
</html>
