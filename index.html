<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — עבודות לנוער</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fefff1; 
            font-family: 'Heebo', sans-serif;
            color: #333;
        }
        .navbar-jobi {
            background-color: #feb900; 
        }
        .job-card {
            background: #ffffff;
            border: 2px solid #feb900; 
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .job-card:hover {
            box-shadow: 0 10px 20px rgba(254, 185, 0, 0.2);
        }
        /* Обновленный баннер 728x90 */
        .banner-container {
            width: 100%;
            max-width: 728px; /* Максимальная ширина по стандарту */
            height: 90px;      /* Фиксированная высота */
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 8px; /* Уменьшил радиус, так как баннер узкий */
        }

        .banner-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: contain; /* Картинка впишется полностью без обрезки */
            background-repeat: no-repeat;
            background-position: center;
            background-color: #eee; /* Фон, если картинка меньше размером */
        }

        }
        .banner-slide.active { opacity: 1; }
    </style>
</head>
<body>

    <header class="navbar-jobi p-3 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2 flex-shrink-0">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="img/logo.png" alt="Jobi" class="h-10 w-auto">
                    <div class="flex flex-col leading-tight">
                        <span class="text-2xl font-black text-black">Jobi</span>
                        <span id="user-ip" class="text-[10px] text-gray-800 font-mono">Loading IP...</span>
                    </div>
                </a>
            </div>

            <form action="app/func/search.html" method="GET" class="flex-grow flex items-center bg-white rounded-full px-4 py-1 max-w-md shadow-sm">
                <input type="text" name="q" placeholder="חפש עבודה..." class="w-full py-2 text-right bg-transparent outline-none text-gray-700">
                <button type="submit">
                    <img src="img/search.png" alt="Search" class="h-5 w-5">
                </button>
            </form>

            <div class="flex items-center gap-3">
                <a href="https://t.me/your_channel" target="_blank">
                    <img src="img/telegram.png" alt="Telegram" class="h-8 w-8 hover:scale-110 transition">
                </a>
                <a href="https://linkedin.com/company/your" target="_blank">
                    <img src="img/linkedin.png" alt="Linkedin" class="h-8 w-8 hover:scale-110 transition">
                </a>
                <a href="app/profile.html">
                    <img src="img/profile.png" alt="Profile" class="h-10 w-10 rounded-full border-2 border-white shadow-sm">
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        
        <section class="banner-container mb-10 shadow-lg">
            <div class="banner-slide active" style="background-image: url('img/ads/banner1.jpg');"></div>
            <div class="banner-slide" style="background-image: url('img/ads/banner2.jpg');"></div>
            <div class="banner-slide" style="background-image: url('img/ads/banner3.jpg');"></div>
        </section>

        <h2 class="text-2xl font-black mb-6 text-right border-r-4 border-[#feb900] pr-3">משרות חמות</h2>
        <div id="jobs-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            storageBucket: "jobi-il.firebasestorage.app",
            messagingSenderId: "1049483275681",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ОПРЕДЕЛЕНИЕ IP ---
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('user-ip').textContent = data.ip;
            })
            .catch(() => {
                document.getElementById('user-ip').textContent = '127.0.0.1';
            });

        // --- ЛОГИКА БАННЕРА ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        function nextSlide() {
            if(slides.length > 0) {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }
        }
        setInterval(nextSlide, 10000);

        // --- ЗАГРУЗКА РАБОТ ---
        async function loadJobs() {
            const container = document.getElementById('jobs-list');
            try {
                const querySnapshot = await getDocs(collection(db, "jobs"));
                querySnapshot.forEach((doc) => {
                    const job = doc.data();
                    const card = `
                        <div class="job-card shadow-sm">
                            <img src="${job.image || 'img/work-default.png'}" class="w-full h-48 object-cover">
                            <div class="p-5">
                                <h3 class="text-xl font-bold mb-2">${job.title}</h3>
                                <div class="text-sm text-gray-600 space-y-1 mb-4">
                                    <p>📍 <b>מיקום:</b> ${job.location}</p>
                                    <p>🛠 <b>סוג עבודה:</b> ${job.type}</p>
                                    <p>💰 <b>שכר:</b> ₪${job.salary} / שעה</p>
                                </div>
                                <a href="app/view.html?id=${doc.id}" 
                                   class="block text-center bg-[#feb900] text-black font-bold py-2 rounded-lg hover:bg-yellow-500 transition">
                                    צפה בפרטים
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (e) {
                console.error("Error loading jobs: ", e);
            }
        }

        loadJobs();
    </script>
</body>
</html>
