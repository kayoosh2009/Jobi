<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — עבודות לנוער</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu(false)"></div>

    <div id="ad-modal" class="hidden fixed inset-0 flex items-center justify-center z-[200] p-4 bg-black/40">
        <div class="bg-white border-4 border-[#feb900] rounded-[25px] p-8 max-w-xs text-center shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-black italic">עוברים לטלגרם?</h3>
            <p class="text-gray-600 mb-6 font-bold">האם ברצונך לעבור לערוץ הרשמי של Jobi?</p>
            <div class="flex gap-2">
                <a id="ad-link" href="https://t.me/jobi_israel" target="_blank" onclick="closeAdModal()" class="bg-[#feb900] flex-1 py-2 rounded-xl font-black text-center text-black">כן, קח אותי</a>
                <button onclick="closeAdModal()" class="bg-gray-200 flex-1 py-2 rounded-xl font-bold text-black">ביטול</button>
            </div>
        </div>
    </div>

    <div id="side-menu" class="side-menu p-6 text-right flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button onclick="toggleMenu(false)" class="text-2xl font-bold">✕</button>
            <img src="img/logo.png" class="h-8">
        </div>
        
        <div id="user-card-menu" class="hidden mb-6 p-4 bg-gray-50 rounded-2xl border-2 border-[#feb900] flex items-center gap-3">
            <img id="menu-avatar" src="img/profile.png" class="h-12 w-12 rounded-full border border-black object-cover">
            <div class="flex flex-col">
                <span id="menu-username" class="font-black text-sm">שם משתמש</span>
                <span class="text-[10px] bg-black text-white px-2 py-0.5 rounded-full w-fit">Level 1</span>
            </div>
        </div>

        <nav id="nav-content" class="flex flex-col gap-5 font-bold text-lg">
            </nav>
    </div>

    <header class="navbar-jobi p-3 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2 flex-shrink-0">
                <img src="img/logo.png" alt="Jobi" class="h-10 w-auto">
                <div class="flex flex-col leading-tight">
                    <span class="text-2xl font-black text-black italic">Jobi</span>
                    <span class="text-[9px] text-gray-800 font-bold opacity-70">מצא את העבודה שלך</span>
                </div>
            </div>

            <form action="app/func/search.html" method="GET" class="hidden md:flex flex-grow items-center bg-white rounded-full px-4 py-1 max-w-md border-2 border-black/10 focus-within:border-black transition">
                <input type="text" name="q" placeholder="חפש משרה..." class="w-full py-2 text-right bg-transparent outline-none text-gray-700 font-bold">
                <button type="submit"><img src="img/search.png" class="h-5 w-5 opacity-60 hover:opacity-100 transition"></button>
            </form>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex gap-3">
                    <a href="https://t.me/jobi_israel"><img src="img/telegram.png" class="h-7 w-7 hover:scale-110 transition"></a>
                </div>
                
                <div class="flex items-center gap-2 bg-white/30 p-1 pr-3 rounded-full border border-white/40">
                    <a href="app/profile.html">
                        <img id="nav-avatar" src="img/profile.png" alt="Profile" class="h-9 w-9 rounded-full border-2 border-white object-cover">
                    </a>
                    <div class="burger-btn" onclick="toggleMenu(true)">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">

        <div class="banner-container mb-10 shadow-lg cursor-pointer" onclick="openAdModal('https://t.me/jobi_israel')">
            <div class="banner-slide" style="background-image: url('img/banner.png');"></div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b-4 border-[#feb900] pb-4">
            <h2 class="text-3xl font-black italic">משרות בשבילך ✨</h2>
            
            <div class="flex flex-wrap gap-2 items-center bg-white/60 p-2 rounded-xl shadow-sm">
                <img src="img/filter.png" class="h-4 w-4 ml-2">
                <select id="f-city" class="filter-select"><option>כל הארץ</option><option>תל אביב</option><option>באר שבע</option></select>
                <select id="f-lang" class="filter-select">
                    <option>שפה...</option>
                    <option>עברית</option>
                    <option>רוסית</option>
                    <option>אנגלית</option>
                </select>
                <select id="f-rate" class="filter-select"><option>דירוג ⭐</option><option>4.5+</option></select>
            </div>
        </div>

        <div id="jobs-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>
    
    <script type="module" src="script.js"></script>
</body>
</html>
