<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — עבודות לנוער</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div id="overlay" class="overlay"></div>

    <div id="side-menu" class="side-menu p-6 text-right flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button id="close-menu-btn" class="text-2xl font-bold hover:text-[#feb900] transition">✕</button>
            <img src="img/logo.png" class="h-8">
        </div>
        
        <div id="user-card-menu" class="hidden mb-6 p-4 bg-gray-50 rounded-2xl border-2 border-[#feb900] flex items-center gap-3">
            <img id="menu-avatar" src="img/profile.png" class="h-12 w-12 rounded-full border border-black object-cover">
            <div class="flex flex-col">
                <span id="menu-username" class="font-black text-sm">שם משתמש</span>
                <span class="text-[10px] bg-black text-white px-2 py-0.5 rounded-full w-fit font-bold italic uppercase">Level 1</span>
            </div>
        </div>

        <nav id="nav-content" class="flex flex-col gap-5 font-bold text-lg">
            </nav>
    </div>

    <header class="navbar-jobi p-3 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="img/logo.png" alt="Jobi" class="h-10">
                <div class="flex flex-col leading-none">
                    <span class="text-2xl font-black italic">Jobi</span>
                    <span class="text-[9px] font-bold opacity-70">עבודות לנוער</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-white/30 p-1 pr-3 rounded-full border border-white/40">
                    <a href="app/profile.html">
                        <img id="nav-avatar" src="img/profile.png" class="h-9 w-9 rounded-full border-2 border-white object-cover">
                    </a>
                    <div id="open-menu-btn" class="burger-btn">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        
        <div id="banner-trigger" class="banner-container mb-10 shadow-lg cursor-pointer">
            <div class="banner-slide" style="background-image: url('img/banner.png');"></div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b-4 border-[#feb900] pb-4">
            <div>
                <h2 class="text-3xl font-black italic tracking-tighter">משרות חמות 🔥</h2>
                <p class="text-xs font-bold text-gray-500 italic">מצא את העבודה הראשונה שלך היום!</p>
            </div>
            
            <div class="flex flex-wrap gap-2 items-center">
                <select id="filter-city" class="filter-select onfocus="this.size=5;" onblur="this.size=1;" onchange="this.size=1; this.blur();">
                    <option value="">בחר עיר...</option>
                    <option value="Abu Ghosh">אבו גוש</option>
                    <option value="Eilat">אילת</option>
                    <option value="El'ad">אלעד</option>
                    <option value="Ashdod">אשדוד</option>
                    <option value="Ashkelon">אשקלון</option>
                    <option value="Beersheba">באר שבע</option>
                    <option value="Beit Shemesh">בית שמש</option>
                    <option value="Beitar Illit">ביתר עילית</option>
                    <option value="Bnei Brak">בני ברק</option>
                    <option value="Bat Yam">בת ים</option>
                    <option value="Givatayim">גבעתיים</option>
                    <option value="Givat Shmuel">גבעת שמואל</option>
                    <option value="Gedera">גדרה</option>
                    <option value="Dimona">דימונה</option>
                    <option value="Hod HaSharon">הוד השרון</option>
                    <option value="Herzliya">הרצליה</option>
                    <option value="Hadera">חדרה</option>
                    <option value="Holon">חולון</option>
                    <option value="Haifa">חיפה</option>
                    <option value="Tiberias">טבריה</option>
                    <option value="Tayibe">טייבה</option>
                    <option value="Tira">טירה</option>
                    <option value="Tamra">טמרה</option>
                    <option value="Yavne">יבנה</option>
                    <option value="Yehud-Monosson">יהוד-מונוסון</option>
                    <option value="Jerusalem">ירושלים</option>
                    <option value="Kfar Saba">כפר סבא</option>
                    <option value="Lod">לוד</option>
                    <option value="Mevaseret Zion">מבשרת ציון</option>
                    <option value="Migdal HaEmek">מגדל העמק</option>
                    <option value="Modi'in-Maccabim-Re'ut">מודיעין-מכבים-רעות</option>
                    <option value="Modi'in Illit">מודיעין עילית</option>
                    <option value="Ma'ale Adumim">מעלה אדומים</option>
                    <option value="Ma'alot-Tarshiha">מעלות-תרשיחא</option>
                    <option value="Nahariya">נהריה</option>
                    <option value="Ness Ziona">נס ציונה</option>
                    <option value="Nazareth">נצרת</option>
                    <option value="Netanya">נתניה</option>
                    <option value="Netivot">נתיבות</option>
                    <option value="Sakhnin">סח'נין</option>
                    <option value="Afula">עפולה</option>
                    <option value="Arad">ערד</option>
                    <option value="Petah Tikva">פתח תקווה</option>
                    <option value="Safed">צפת</option>
                    <option value="Kiryat Ata">קרית אתא</option>
                    <option value="Kiryat Gat">קרית גת</option>
                    <option value="Kiryat Motzkin">קרית מוצקין</option>
                    <option value="Kiryat Ono">קרית אונו</option>
                    <option value="Rishon LeZion">ראשון לציון</option>
                    <option value="Rehovot">רחובות</option>
                    <option value="Ramla">רמלה</option>
                    <option value="Ramat Gan">רמת גן</option>
                    <option value="Ramat HaSharon">רמת השרון</option>
                    <option value="Ra'anana">רעננה</option>
                    <option value="Sderot">שדרות</option>
                    <option value="Tel Aviv">תל אביב</option>
                </select>
                <select id="filter-age" class="filter-select">
                    <option value="">גיל...</option>
                    <option value="14">14+</option>
                    <option value="16">16+</option>
                    <option value="18">18+</option>
                </select>
            </div>
        </div>

        <div id="jobs-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-gray-200 h-64 rounded-2xl col-span-1"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-2xl col-span-1 hidden md:block"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-2xl col-span-1 hidden lg:block"></div>
        </div>
    </main>

    <div id="ad-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="bg-white p-8 rounded-3xl relative z-10 max-w-sm w-full text-center border-4 border-[#feb900]">
            <h3 class="text-2xl font-black mb-4 italic">רוצה עוד משרות?</h3>
            <p class="font-bold mb-6">הצטרף לערוץ הטלגרם שלנו וקבל עדכונים בזמן אמת!</p>
            <a id="ad-link" href="#" target="_blank" class="block w-full bg-[#feb900] text-black font-black py-4 rounded-xl mb-3 hover:scale-105 transition">מעבר לטלגרם 🚀</a>
            <button onclick="document.getElementById('ad-modal').classList.add('hidden')" class="text-gray-400 font-bold text-sm underline">סגור</button>
        </div>
    </div>

    <script type="module" src="js/index.js"></script>
</body>
</html>
