<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Admin — הוספת עסק חדש</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Heebo', sans-serif; }
        .form-card { background: #151515; border: 1px solid #333; border-radius: 30px; }
        .input-field { background: #222; border: 2px solid #333; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; text-align: right; }
        .input-field:focus { border-color: #feb900; }
        label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 14px; color: #aaa; }
        .section-title { border-right: 4px solid #feb900; padding-right: 12px; margin-bottom: 20px; font-weight: 900; color: #feb900; }
    </style>
</head>
<body class="p-6">

    <div class="container mx-auto max-w-4xl">
        <a href="../dash.html" class="text-gray-500 hover:text-white mb-6 inline-block font-bold">→ חזרה ללוח הבקרה</a>
        
        <form id="add-business-form" class="form-card p-10 shadow-2xl">
            <h1 class="text-3xl font-black mb-8 italic text-center underline decoration-[#feb900]">רישום עסק חדש במערכת</h1>

            <div class="mb-10">
                <h3 class="section-title text-xl">פרטי התחברות (Account)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label>אימייל עסקי (@jobi.israel)</label>
                        <input type="email" id="email" required class="input-field" placeholder="name@jobi.israel">
                    </div>
                    <div>
                        <label>סיסמה ראשונית</label>
                        <input type="text" id="password" required class="input-field" placeholder="Password123!">
                    </div>
                </div>
            </div>

            <div class="mb-10 text-right">
                <h3 class="section-title text-xl">מידע על העסק</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label>שם העסק</label>
                        <input type="text" id="bizName" required class="input-field">
                    </div>
                    <div>
                        <label>עיר וכתובת</label>
                        <input type="text" id="address" required class="input-field" placeholder="תל אביב, הרצל 10">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label>שכר (מ-)</label>
                        <input type="number" id="salaryMin" class="input-field" placeholder="₪">
                    </div>
                    <div>
                        <label>שכר (עד-)</label>
                        <input type="number" id="salaryMax" class="input-field" placeholder="₪">
                    </div>
                    <div>
                        <label>גיל מינימלי</label>
                        <input type="number" id="age" class="input-field" placeholder="16">
                    </div>
                </div>
            </div>

            <div class="mb-10 text-right">
                <h3 class="section-title text-xl">דרישות וקשר</h3>
                <div class="mb-6">
                    <label>שפות נדרשות</label>
                    <input type="text" id="languages" class="input-field" placeholder="עברית, אנגלית...">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label>מספר טלפון ליצירת קשר</label>
                        <input type="tel" id="bizPhone" class="input-field">
                    </div>
                    <div>
                        <label>רשתות חברתיות (לינקים)</label>
                        <input type="text" id="socials" class="input-field" placeholder="Instagram, TikTok...">
                    </div>
                </div>
                <div>
                    <label>תיאור התפקיד והעבודה</label>
                    <textarea id="description" rows="4" class="input-field"></textarea>
                </div>
            </div>

            <div class="mb-10 text-right">
                <h3 class="section-title text-xl">מדיה (לוגו ותמונות)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label>לוגו העסק</label>
                        <input type="file" id="logoInput" accept="image/*" class="text-sm text-gray-400">
                    </div>
                    <div>
                        <label>תמונות העסק (עד 10)</label>
                        <input type="file" id="photosInput" accept="image/*" multiple class="text-sm text-gray-400">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#feb900] text-black font-black py-5 rounded-2xl text-xl hover:bg-yellow-500 transition shadow-[0_0_20px_rgba(254,185,0,0.3)]">
                צור עסק ושמור פרטים
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Функция скачивания TXT
        function downloadInfo(data) {
            const content = `
JOBI BUSINESS ACCESS CARD
-------------------------
שם העסק: ${data.bizName}
אימייל: ${data.email}
סיסמה: ${data.password}

פרטים נוספים:
כתובת: ${data.address}
שכר: ${data.salaryMin} - ${data.salaryMax}
טלפון: ${data.bizPhone}
-------------------------
נא לשלוח לבעל העסק ולבקש להחליף סיסמה בכניסה הראשונה.
            `;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Access_${data.bizName}.txt`;
            link.click();
        }

        document.getElementById('add-business-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const bizData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                bizName: document.getElementById('bizName').value,
                address: document.getElementById('address').value,
                salaryMin: document.getElementById('salaryMin').value,
                salaryMax: document.getElementById('salaryMax').value,
                age: document.getElementById('age').value,
                languages: document.getElementById('languages').value,
                bizPhone: document.getElementById('bizPhone').value,
                socials: document.getElementById('socials').value,
                description: document.getElementById('description').value
            };

            try {
                // 1. Создаем аккаунт в Auth
                const userCredential = await createUserWithEmailAndPassword(auth, bizData.email, bizData.password);
                const user = userCredential.user;

                // 2. Сохраняем все данные в Firestore
                await setDoc(doc(db, "businesses", user.uid), {
                    ...bizData,
                    role: 'business',
                    createdAt: new Date().toISOString()
                });

                // 3. Скачиваем файл
                downloadInfo(bizData);

                alert("העסק נוצר בהצלחה! קובץ הגישה יורד למחשב.");
                window.location.href = '../dash.html';

            } catch (error) {
                console.error(error);
                alert("שגיאה ביצירת עסק: " + error.message);
            }
        };
    </script>
</body>
</html>
