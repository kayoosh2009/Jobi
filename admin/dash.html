<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Admin — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #111; color: white; font-family: 'Heebo', sans-serif; }
        .stat-card { background: #1a1a1a; border-right: 4px solid #feb900; }
    </style>
</head>
<body>

    <nav class="bg-black border-b border-[#feb900] p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="../img/logo.png" class="h-8">
            <span class="font-black text-xl">CONTROL <span class="text-[#feb900]">CENTER</span></span>
        </div>
        <button onclick="logout()" class="bg-red-600 text-white px-4 py-1 rounded-lg font-bold text-sm">LOGOUT</button>
    </nav>

    <main class="container mx-auto p-6">
        <h1 class="text-3xl font-black mb-8">שלום, אדמין 👋</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card p-6 rounded-xl">
                <p class="text-gray-400 text-sm">סה"כ משתמשים</p>
                <h2 class="text-4xl font-black text-[#feb900]">1,240</h2>
            </div>
            <div class="stat-card p-6 rounded-xl">
                <p class="text-gray-400 text-sm">משרות פעילות</p>
                <h2 class="text-4xl font-black text-[#feb900]">85</h2>
            </div>
            <div class="stat-card p-6 rounded-xl">
                <p class="text-gray-400 text-sm">דיווחים / בעיות</p>
                <h2 class="text-4xl font-black text-red-500">3</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-[#1a1a1a] p-6 rounded-2xl border border-gray-800">
                <h3 class="text-xl font-black mb-4 border-b border-gray-700 pb-2 text-[#feb900]">ניהול עסקים</h3>
                <div class="space-y-3">
                    <p class="text-sm text-gray-400 italic">כאן תוכל ליצור חשבונות למעסיקים חדשים...</p>
                    <button class="w-full bg-white text-black font-bold py-2 rounded-lg mt-2">+ הוסף עסק חדש</button>
                </div>
            </div>

            <div class="bg-[#1a1a1a] p-6 rounded-2xl border border-gray-800">
                <h3 class="text-xl font-black mb-4 border-b border-gray-700 pb-2 text-[#feb900]">בקשות תמיכה</h3>
                <p class="text-sm text-gray-400 italic text-center py-10">אין הודעות חדשות</p>
            </div>
        </div>
    </main>

    <script>
        // Проверка прав при входе
        if (localStorage.getItem('jobi_admin') !== 'true') {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('jobi_admin');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
