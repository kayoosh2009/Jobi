<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi — הגדרות</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fefff1; font-family: 'Heebo', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .settings-card { background: white; border: 2px solid #feb900; border-radius: 30px; box-shadow: 0 10px 25px rgba(254, 185, 0, 0.1); overflow: hidden; }
        .input-field { border: 2px solid #feb900; border-radius: 12px; outline: none; transition: 0.3s; padding: 10px; width: 100%; text-align: right; font-size: 14px; }
        .input-field:focus { box-shadow: 0 0 8px rgba(254, 185, 0, 0.4); }
        .btn-save { background-color: #feb900; transition: 0.3s; font-weight: 900; }
        .btn-save:hover { background-color: #e5a700; transform: translateY(-2px); }
        
        /* Стили для фото */
        .banner-edit { width: 100%; height: 120px; background: #f3f4f6; position: relative; border-bottom: 2px solid #feb900; cursor: pointer; }
        .avatar-edit { width: 90px; height: 90px; background: white; border: 3px solid #feb900; border-radius: 50%; position: absolute; bottom: -45px; right: 20px; z-index: 10; cursor: pointer; overflow: hidden; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .edit-badge { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; items-center; justify-content: center; opacity: 0; transition: 0.3s; color: white; font-size: 12px; }
        .banner-edit:hover .edit-badge, .avatar-edit:hover .edit-badge { opacity: 1; }
    </style>
</head>
<body class="p-4">

    <div class="settings-card w-full max-w-xl">
        <div class="relative mb-14">
            <div class="banner-edit" onclick="document.getElementById('banner-input').click()">
                <img id="banner-preview" src="../img/default-banner.png" class="preview-img">
                <div class="edit-badge font-bold">שנה רקע 📷</div>
            </div>
            <div class="avatar-edit" onclick="document.getElementById('avatar-input').click()">
                <img id="avatar-preview" src="../img/default-avatar.png" class="preview-img">
                <div class="edit-badge font-bold italic">ערוך 📷</div>
            </div>
            <input type="file" id="banner-input" class="hidden" accept="image/*" onchange="previewImage(this, 'banner-preview')">
            <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="previewImage(this, 'avatar-preview')">
        </div>

        <form id="settings-form" class="px-8 pb-8 space-y-4">
            <div class="text-right mb-6">
                <h1 class="text-2xl font-black text-gray-900">הגדרות פרופיל</h1>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">שם מלא</label>
                    <input type="text" id="fullName" class="input-field">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">ניקנייים</label>
                    <input type="text" id="nickname" class="input-field">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">מוסד לימודים</label>
                    <input type="text" id="school" class="input-field" placeholder="שם בית הספר">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">עיר מגורים</label>
                    <select id="city" class="input-field">
                        <option value="Beersheba">באר שבע</option>
                        <option value="Tel Aviv">תל אביב</option>
                        <option value="Jerusalem">ירושלים</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 border-t pt-4">
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">טלפון נייד</label>
                    <input type="tel" id="phone" class="input-field" placeholder="05X-XXXXXXX">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 mr-1">טלפון הורים</label>
                    <input type="tel" id="parentPhone" class="input-field" placeholder="05X-XXXXXXX">
                </div>
            </div>

            <div class="space-y-3 border-t pt-4">
                <h3 class="text-sm font-black italic">רשתות חברתיות</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <input type="text" id="tg-nick" class="input-field pr-8" placeholder="Telegram @">
                    </div>
                    <div class="relative">
                        <input type="text" id="tt-nick" class="input-field pr-8" placeholder="TikTok @">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-lg shadow-md mt-6 bg-[#feb900]">שמור שינויים</button>
            <a href="../index.html" class="block text-center text-sm font-bold text-gray-400 mt-2">חזרה לתפריט</a>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            storageBucket: "jobi-il.firebasestorage.app",
            messagingSenderId: "1049483275681",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Проверка входа
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '../account/login.html';
            } else {
                loadUserData(user.uid);
            }
        });

        // Загрузка данных из БД
        async function loadUserData(uid) {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('fullName').value = data.fullName || '';
                document.getElementById('nickname').value = data.nickname || '';
                document.getElementById('school').value = data.school || '';
                document.getElementById('city').value = data.city || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('parentPhone').value = data.parentPhone || '';
                document.getElementById('tg-nick').value = data.telegram || '';
                document.getElementById('tt-nick').value = data.tiktok || '';
                if(data.avatar) document.getElementById('avatar-preview').src = data.avatar;
                if(data.banner) document.getElementById('banner-preview').src = data.banner;
            }
        }

        // Предпросмотр фото
        window.previewImage = (input, imgId) => {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById(imgId).src = e.target.result;
                reader.readAsDataURL(file);
            }
        };

        // Сохранение
        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            try {
                await updateDoc(doc(db, "users", user.uid), {
                    fullName: document.getElementById('fullName').value,
                    nickname: document.getElementById('nickname').value,
                    school: document.getElementById('school').value,
                    city: document.getElementById('city').value,
                    phone: document.getElementById('phone').value,
                    parentPhone: document.getElementById('parentPhone').value,
                    telegram: document.getElementById('tg-nick').value,
                    tiktok: document.getElementById('tt-nick').value,
                    avatar: document.getElementById('avatar-preview').src,
                    banner: document.getElementById('banner-preview').src
                });
                alert("הנתונים עודכנו בהצלחה!");
            } catch (error) {
                alert("שגיאה בעדכון הנתונים");
            }
        };
    </script>
</body>
</html>
