<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobi Business — כניסת מעסיקים</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fefff1 0%, #fff9e6 100%); font-family: 'Heebo', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .biz-card { background: white; border: 3px solid #000; border-radius: 30px; box-shadow: 10px 10px 0px #feb900; }
        .input-field { border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.3s; padding: 12px; width: 100%; text-align: right; }
        .input-field:focus { border-color: #feb900; box-shadow: 0 0 8px rgba(254, 185, 0, 0.2); }
        .btn-biz { background-color: #000; color: #feb900; transition: 0.3s; font-weight: 900; }
        .btn-biz:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #feb900; }
    </style>
</head>
<body class="p-4">

    <div class="biz-card w-full max-w-md p-10">
        <div class="text-center mb-8">
            <img src="../img/logo.png" class="h-16 mx-auto mb-4">
            <h1 class="text-3xl font-black text-black">Jobi <span class="text-[#feb900]">Business</span></h1>
            <p class="text-gray-500 font-bold">מערכת ניהול מעסיקים</p>
        </div>

        <form id="biz-login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold mb-1 mr-1 text-black">אימייל עסקי (@jobi.israel)</label>
                <input type="email" id="email" required class="input-field" placeholder="name@jobi.israel">
            </div>

            <div>
                <label class="block text-sm font-bold mb-1 mr-1 text-black">סיסמה</label>
                <input type="password" id="password" required class="input-field" placeholder="••••••••">
            </div>

            <div id="error-msg" class="text-red-500 text-sm font-bold text-center hidden"></div>

            <button type="submit" class="btn-biz w-full py-4 rounded-xl text-lg mt-4">כניסה למערכת</button>
        </form>
        
        <p class="text-center text-xs text-gray-400 mt-8 font-bold">
            כניסה זו מיועדת למעסיקים מאושרים בלבד
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA9KfdcE2acdeSgkfRVS_KiX1eBBrR1Ao",
            authDomain: "jobi-il.firebaseapp.com",
            projectId: "jobi-il",
            appId: "1:1049483275681:web:ef9bb3c9343aa0939d6fe0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('biz-login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            // Проверка домена
            if (!email.endsWith('@jobi.israel')) {
                errorDiv.textContent = "גישה נדחתה: יש להשתמש באימייל של jobi.israel בלבד";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('user_role', 'business');
                window.location.href = 'profile.html';
            } catch (error) {
                errorDiv.textContent = "פרטי התחברות שגויים";
                errorDiv.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
